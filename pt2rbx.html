<!DOCTYPE html>
<html>
  <head>
    <title>Polytoria 2 Roblox</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
      head {
        font-family: "Inter", sans-serif;
        color: white;
      }
      body {
        margin: 0;
        background-color: #252525;
        font-family: "Inter", sans-serif;
        color: white;
      }
      .cool-hero {
        height: 250px;
        background-image: linear-gradient(90deg, #bf4197 0%, #257fdbc7 100%);
        display: flex;
        justify-content: space-evenly;
        align-items: start;
      }
      .title {
        font-weight: 900;
        font-size: 2.5rem;
        text-align: center;
      }

      .upload-area {
        border-radius: 20px;
        padding: 10px;
        backdrop-filter: blur(80px);
        width: 250px;
        height: 250px;
        border: 2px dotted #bf4197;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #bf4197;
        flex-direction: column;
        transition: 0.5s box-shadow linear;
        background-color: transparent;
      }
      .upload-area:hover {
        box-shadow: 0 0 20px 7px #bf4195ef;
        backdrop-filter: blur(180px);
      }
      .upload-area-centerizer {
        display: flex;
        justify-content: center;
        margin-top: -100px;
        z-index: 20;
      }

      #imageInput, #sourceCanvas {
        display: none;
      }

      .card {
        padding: 20px;
        border-radius: 10px;
        background-color: #181818;
        color: #2d144b;
        width: 75%;
      }

      .card-centerize {
        display: flex;
        justify-content: center;
        padding: 20px;
      }

      @media (max-width: 800px) {
        .card {
          max-width: 100%;
          overflow: scroll;
        }
      }
    </style>
  </head>
  <body>
    <div class="cool-hero">
      <div>
        <p class="title">POLYTORIA TO ROBLOX SHIRT CONVERTER</p>
        <p align="center"><a href="index.html">Go back to RBX2PT</a></p>
      </div>
    </div>
    <div class="upload-area-centerizer">
      <button class="upload-area" id="uploadButton">
        <svg width="32px" height="32px" fill="currentColor" viewBox="0 0 32 32" version="1.1" xmlns="http://www.w3.org/2000/svg">
          <path d="M16.884 7.116c-0.011-0.011-0.027-0.015-0.039-0.026-0.104-0.1-0.225-0.183-0.359-0.243l-0.008-0.003-0.004-0c-0.129-0.050-0.279-0.079-0.435-0.079-0.072 0-0.142 0.006-0.21 0.018l0.007-0.001c-0.058 0.007-0.109 0.018-0.158 0.031l0.008-0.002c-0.223 0.051-0.416 0.158-0.571 0.306l0.001-0-5 5c-0.225 0.226-0.363 0.537-0.363 0.881 0 0.69 0.56 1.25 1.25 1.25 0.344 0 0.655-0.139 0.881-0.363l2.866-2.866v18.982c0 0.69 0.56 1.25 1.25 1.25s1.25-0.56 1.25-1.25v0-18.982l2.865 2.866c0.226 0.227 0.539 0.367 0.885 0.367 0.691 0 1.251-0.56 1.251-1.251 0-0.345-0.14-0.658-0.366-0.884v0zM30 0.75h-28c-0.69 0-1.25 0.56-1.25 1.25s0.56 1.25 1.25 1.25v0h28c0.69 0 1.25-0.56 1.25-1.25s-0.56-1.25-1.25-1.25v0z"></path>
        </svg>
        <p>Drag & drop, or click to upload</p>
      </button>
    </div>
    <input type="file" accept="image/*" id="imageInput">
    <canvas id="sourceCanvas" width="1024" height="1024"></canvas>
    <div class="card-centerize">
      <div class="card">
        <canvas id="destinationCanvas" width="585" height="559"></canvas>
      </div>
    </div>
    <script>
      const sourceCanvas = document.getElementById('sourceCanvas');
      const sourceCtx = sourceCanvas.getContext('2d');
      const destinationCanvas = document.getElementById('destinationCanvas');
      const destinationCtx = destinationCanvas.getContext('2d');

      const imageInput = document.getElementById('imageInput');
      imageInput.addEventListener('change', handleImageUpload);

      const uploadButton = document.getElementById('uploadButton');
      uploadButton.addEventListener('click', (e) => {
        imageInput.click();
      });
      uploadButton.addEventListener('dragover', (e) => e.preventDefault());
      uploadButton.addEventListener('drop', (e) => {
        e.preventDefault();
        e.target.files = [e.dataTransfer.items[0].getAsFile()];
        handleImageUpload(e);
      });

      function handleImageUpload(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.onload = function() {
            sourceCtx.clearRect(0, 0, sourceCanvas.width, sourceCanvas.height);
            sourceCtx.drawImage(img, 0, 0);
            processImage();
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }

      function processImage() {
        // Clear destination
        destinationCtx.clearRect(0, 0, destinationCanvas.width, destinationCanvas.height);

        // Regions: crop from new Polytoria template, paste into Roblox template
        // This is the exact inverse of the official Polytoria ImageMagick script
        // cropX/Y/Width/Height = position on Polytoria 1024x1024 source
        // pasteX/Y            = position on Roblox 585x559 destination
        // resizeWidth/Height  = final size in Roblox template
        const regions = [
          // --- Torso ---
          { cropX: 439, cropY: 103, cropWidth: 146, cropHeight: 290, pasteX: 231, pasteY:  74, resizeWidth: 128, resizeHeight: 128 }, // Front
          { cropX: 351, cropY: 103, cropWidth:  88, cropHeight: 290, pasteX: 165, pasteY:  74, resizeWidth:  64, resizeHeight: 128 }, // Right side
          { cropX: 585, cropY: 103, cropWidth:  88, cropHeight: 290, pasteX: 361, pasteY:  74, resizeWidth:  64, resizeHeight: 128 }, // Left side
          { cropX: 439, cropY:   7, cropWidth: 146, cropHeight:  96, pasteX: 231, pasteY:   8, resizeWidth: 128, resizeHeight:  64 }, // Top
          { cropX: 439, cropY: 393, cropWidth: 146, cropHeight:  96, pasteX: 231, pasteY: 204, resizeWidth: 128, resizeHeight:  64 }, // Bottom
          { cropX: 439, cropY: 519, cropWidth: 146, cropHeight: 290, pasteX: 427, pasteY:  74, resizeWidth: 128, resizeHeight: 128 }, // Back

          // --- Right Arm ---
          { cropX:   6, cropY:  71, cropWidth: 66, cropHeight: 290, pasteX:  19, pasteY: 355, resizeWidth: 64, resizeHeight: 128 }, // Left face
          { cropX:  72, cropY:  71, cropWidth: 66, cropHeight: 290, pasteX:  85, pasteY: 355, resizeWidth: 64, resizeHeight: 128 }, // Back face
          { cropX: 138, cropY:  71, cropWidth: 66, cropHeight: 290, pasteX: 151, pasteY: 355, resizeWidth: 64, resizeHeight: 128 }, // Right face
          { cropX: 204, cropY:  71, cropWidth: 66, cropHeight: 290, pasteX: 217, pasteY: 355, resizeWidth: 64, resizeHeight: 128 }, // Front face
          { cropX: 204, cropY:   7, cropWidth: 66, cropHeight:  64, pasteX: 217, pasteY: 289, resizeWidth: 64, resizeHeight:  64 }, // Top cap
          { cropX: 204, cropY: 361, cropWidth: 66, cropHeight:  64, pasteX: 217, pasteY: 485, resizeWidth: 64, resizeHeight:  64 }, // Bottom cap

          // --- Left Arm ---
          { cropX: 754, cropY:  71, cropWidth: 66, cropHeight: 290, pasteX: 308, pasteY: 355, resizeWidth: 64, resizeHeight: 128 }, // Front face
          { cropX: 754, cropY:   7, cropWidth: 66, cropHeight:  64, pasteX: 308, pasteY: 289, resizeWidth: 64, resizeHeight:  64 }, // Top cap
          { cropX: 754, cropY: 361, cropWidth: 66, cropHeight:  64, pasteX: 308, pasteY: 485, resizeWidth: 64, resizeHeight:  64 }, // Bottom cap
          { cropX: 820, cropY:  71, cropWidth: 66, cropHeight: 290, pasteX: 374, pasteY: 355, resizeWidth: 64, resizeHeight: 128 }, // Left face
          { cropX: 886, cropY:  71, cropWidth: 66, cropHeight: 290, pasteX: 440, pasteY: 355, resizeWidth: 64, resizeHeight: 128 }, // Back face
          { cropX: 952, cropY:  71, cropWidth: 66, cropHeight: 290, pasteX: 506, pasteY: 355, resizeWidth: 64, resizeHeight: 128 }, // Right face
        ];

        sourceCtx.imageSmoothingEnabled = true;
        destinationCtx.canvas.willReadFrequently = true;

        regions.forEach(region => {
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = region.resizeWidth;
          tempCanvas.height = region.resizeHeight;
          const tempCtx = tempCanvas.getContext('2d');
          tempCtx.imageSmoothingEnabled = true;

          tempCtx.drawImage(
            sourceCanvas,
            region.cropX, region.cropY, region.cropWidth, region.cropHeight,
            0, 0, region.resizeWidth, region.resizeHeight
          );

          const resizedImageData = tempCtx.getImageData(0, 0, region.resizeWidth, region.resizeHeight);
          destinationCtx.putImageData(resizedImageData, region.pasteX, region.pasteY);
        });

        const outputImage = destinationCanvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = outputImage;
        link.download = 'output_image.png';
        link.click();
      }
    </script>
  </body>
</html>
